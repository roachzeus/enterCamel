            name: city
            expression:
              simple:
                id: simple9273
                expression: ${body.city}
        - setHeader:
            id: setHeadere21e
            name: CamelHttpMethod
            expression:
              constant:
                id: constantf917
                expression: GET
        - setBody:
            id: setBodyf2bb
            expression:
              simple:
                id: simple2762
                expression: ${null}
        - removeHeaders:
