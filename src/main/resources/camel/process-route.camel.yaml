- rest:
    id: restb9a9
    post:
      - id: postf625
        path: process
        to: direct:process
        consumes: application/json
        produces: application/json
- route:
    id: routead6a
    from:
      id: fromacea
      uri: direct
      parameters:
        name: process
      steps:
        - unmarshal:
            id: unmarshal85e3
            json:
              id: json20c2
              unmarshalType: fi.roachzeus.enterCamel.ProcessRequest
        - bean:
            id: bean0a76
            ref: requestValidator
            method: validate
        - setVariable:
            id: setVariable7c8c
            name: name
            expression:
              simple:
                id: simple4c25
                expression: ${body.name}
        - setVariable:
            id: setVariablece83
            name: city
            expression:
              simple:
                id: simple477c
                expression: ${body.city}
        - setVariable:
            id: setVariable2db7
            name: uuid
