            expression:
              simple:
                id: simple94aa
                expression: ${date:now:yyyy-MM-dd'T'HH:mm:ssXXX}
        - log:
            id: log7ddd
            message: |
              {"uuid":"${variable.uuid}",
               "timestamp":"${variable.timestamp}",
               "name":"${variable.name}",
               "city":"${variable.city}"}
        - to:
            id: to6764
            uri: direct
            parameters:
              name: geocode
        - to:
            id: toe078
            uri: direct
            parameters:
              name: weather
        - bean:
