apiVersion: apps/v1
kind: Deployment
metadata:
  name: enter-camel-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enter-camel
  template:
    metadata:
      labels:
        app: enter-camel
    spec:
      containers:
      - env:
        - name: ENVIRONMENT
          value: development
        image: entercamel
        imagePullPolicy: IfNotPresent
        name: enter-camel-container
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi